version: 1
kind: devstack
name: dev
env_files:
  - .env
  - .env.local

services:
  postgres:
    run: |
      docker run --rm --name stack-postgres \
        -e POSTGRES_USER=app -e POSTGRES_PASSWORD=app -e POSTGRES_DB=app \
        -p 5432:5432 postgres:16-alpine
    ready:
      tcp: localhost:5432
      timeout: 30s

  core:
    run: go run .
    workdir: apps/core
    depends_on:
      - postgres
    ready:
      http: http://localhost:4100/health
      timeout: 90s

# One-shot jobs run once at startup and exit 0 (their exit is the ready
# signal, never a stack-wide failure).
jobs:
  # The CLI (apps/cli) is the sklp-create scaffolder, not a long-running
  # service — build it into bin/ so it's on hand while developing.
  build-cli:
    run: go build -o ../../bin/sklp-create ./cmd/sklp-create
    workdir: apps/cli
    oneshot: true
