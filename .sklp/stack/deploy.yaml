# yaml-language-server: $schema=../../apps/sklp/runner/deploy.schema.json
#
# Local deploy contract — `sklp deploy stack` runs the published core image on
# this node, the deploy-side counterpart of dev.yaml (which runs core from
# source via `go run`). This repo is backend + CLI only; scaffolded projects
# ship their own web, so there is no web service here.
#
# Run with:   sklp deploy stack        # brings up the `production` space
# Inspect:    sklp deploy ls
# Delete:     sklp deploy delete stack
#
# Images are pinned immutable tags (no `latest`). Bump `core.image` to the tag
# you want to run; the value here tracks the current production rollout.
version: 1
kind: deploy
name: stack

services:
  # Go backend on :4100 with a /health probe. Postgres DSN is injected via the
  # host's .env (DATABASE_URL) — never bake real credentials into this file.
  core:
    image: rg.fr-par.scw.cloud/skaplai/core:20260714-0707-49431b7
    port: 4100
    ready:
      http: http://localhost:4100/health
      timeout: 90s

spaces:
  # The single permanent local space; ingress maps the host port to core's
  # container port so the app is reachable on the familiar dev port.
  production:
    ingress:
      core: "4100:4100"
