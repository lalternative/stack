version: 1
kind: pipeline
name: ci
description: |
  Lint + test each service whose files changed since base_ref. Scope
  granularity is the service. The `shared` scope retests everything
  on changes to .sklp/ or root Dockerfiles.

inputs:
  base_ref:
    type: string
    required: false
    default: origin/main

# Tool versions come from .sklp/space.yaml (go + swag via go_tools); steps
# only name which ones they use.

scopes:
  core:
    - "apps/core/**"
    - "Dockerfile"
    - "go.work"
    - "go.work.sum"
  cli:
    - "apps/cli/**"
  shared:
    - ".sklp/**"
    - "Dockerfile"

steps:
  - name: branch-context
    tools: []
    run: |
      git status --short
      git branch --show-current

  - name: test-core
    scope: [core, shared]
    tools: [go]
    run: cd apps/core && go test ./...

  - name: test-cli
    scope: [cli, shared]
    tools: [go]
    run: cd apps/cli && go test ./...

  # Fails on drift: the checked-in OpenAPI spec must match what the annotated
  # handlers produce.
  - name: swagger-up-to-date
    scope: [core, shared]
    tools: [go, swag]
    run: |
      cd apps/core && swag init -g main.go --parseDependency --parseInternal -q
      cd ../.. && git diff --exit-code -- apps/core/docs
