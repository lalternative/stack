version: 1
kind: pipeline
name: generate
description: |
  Regenerate the checked-in core OpenAPI spec from the annotated Echo
  handlers.

    swagger  regenerates apps/core/docs from handler annotations

  The repo ships no frontend of its own (generated projects scaffold their
  own web app), so there is no TS client to generate here.

# Tool versions come from .sklp/space.yaml (go + swag via go_tools).

steps:
  - name: swagger
    tools: [go, swag]
    run: cd apps/core && swag init -g main.go --parseDependency --parseInternal -q
