version: 1
kind: pipeline
name: build
description: Build the project CLI binary and core service.

tools:
  go: "1.25.0"

steps:
  - name: build-cli
    tools: [go]
    run: |
      mkdir -p bin
      cd apps/cli && go build -o ../../bin/app ./cmd/app

  - name: build-core
    tools: [go]
    run: |
      mkdir -p bin
      cd apps/core && go build -o ../../bin/core .
