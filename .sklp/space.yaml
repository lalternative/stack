# yaml-language-server: $schema=../apps/sklp/runner/space.schema.json
#
# Rootfs contract for daemonless build/CI. `sklp run <task>` bakes this into
# an on-the-fly rootfs (toolchain + packages + go_tools), no runner image pull.
runner:
  registry: rg.fr-par.scw.cloud/skaplai
  registry_auth_secret: scw-registry-credentials

  toolchain:
    go: "1.25.0"
    node: "22.19.0"
    pnpm: "10.27.0"
    gitleaks: "8.18.4"
    trivy: "0.70.0"

  packages:
    - git
    - ca-certificates
    - curl
    # gcc + headers for `go test -race`; core builds CGO_ENABLED=0 so no g++.
    - gcc
    - libc6-dev

  go_tools:
    - github.com/swaggo/swag/cmd/swag@v1.16.6
    - golang.org/x/vuln/cmd/govulncheck@v1.3.0

  env:
    GOFLAGS: -mod=readonly
