version: 1
kind: pipeline
name: ci
description: |
  Lint + test each service whose files changed since base_ref. Scope
  granularity is the service. The `shared` scope retests everything
  on changes to .sklp/, root Dockerfiles, or workspace files.

inputs:
  base_ref:
    type: string
    required: false
    default: origin/main

tools:
  go: "1.26.5"
  node: "22.19.0"
  pnpm: "10.27.0"

scopes:
  core:
    - "apps/core/**"
    - "Dockerfile"
    - "go.work"
    - "go.work.sum"
  web:
    - "apps/web/**"
    - "package.json"
    - "pnpm-lock.yaml"
    - "Dockerfile.web"
  front:
    - "lib/front/**"
  shared:
    - ".sklp/**"
    - "Dockerfile"

steps:
  - name: branch-context
    tools: []
    run: |
      git status --short
      git branch --show-current

  - name: test-core
    scope: [core, shared]
    tools: [go]
    run: cd apps/core && go test ./...

  - name: lint-web
    scope: [web, shared]
    tools: [node, pnpm]
    run: pnpm --filter @app/web lint

  - name: typecheck-web
    scope: [web, shared]
    tools: [node, pnpm]
    run: pnpm --filter @app/web typecheck

  - name: lint-front
    scope: [front, shared]
    tools: [node, pnpm]
    run: pnpm --filter @app/front lint

  # Fails on drift: the checked-in OpenAPI spec must match what the annotated
  # handlers produce. `swag` comes from the runner toolchain
  # (.sklp/space.yaml go_tools). The web app is a fresh TanStack Start scaffold
  # and no longer drives orval client generation; rewire lib/front to the spec
  # by hand if you need the typed client.
  - name: swagger-up-to-date
    scope: [core, shared]
    tools: [go]
    run: |
      cd apps/core && swag init -g main.go --parseDependency --parseInternal -q
      cd ../.. && git diff --exit-code -- apps/core/docs
