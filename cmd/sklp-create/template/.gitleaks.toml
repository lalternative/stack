title = "bootstrap gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allow placeholder env values in .env.example"
paths = [
  '''\.env\.example$''',
  '''\.env\.example\.local$''',
]
regexes = [
  '''SKALPAI_API_KEY=$''',
  '''SCW_SECRET_KEY=$''',
  '''SCW_ACCESS_KEY=$''',
]
