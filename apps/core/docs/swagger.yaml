basePath: /api/v1
definitions:
  echo.HTTPError:
    properties:
      message: {}
    type: object
  project.CreateRequest:
    properties:
      name:
        type: string
    type: object
  project.ProjectDTO:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
    type: object
info:
  contact: {}
  description: Stack application core REST API.
  title: Core API
  version: 0.1.0
paths:
  /projects:
    get:
      operationId: listProjects
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/project.ProjectDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: List projects owned by the caller
      tags:
      - projects
    post:
      consumes:
      - application/json
      operationId: createProject
      parameters:
      - description: Project to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/project.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/project.ProjectDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Create a project
      tags:
      - projects
securityDefinitions:
  BearerAuth:
    description: Pass `Bearer <token>`. JWT is verified by the gateway; the user id
      arrives as the X-User-Id header.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
