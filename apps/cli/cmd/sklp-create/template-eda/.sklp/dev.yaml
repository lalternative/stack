version: 1
kind: devstack
name: dev
env_files:
  - .env
  - .env.local

services:
  postgres:
    run: |
      docker run --rm --name app-postgres \
        -e POSTGRES_USER=app -e POSTGRES_PASSWORD=app -e POSTGRES_DB=app \
        -p 5432:5432 postgres:16-alpine
    ready:
      tcp: localhost:5432
      timeout: 30s

  nats:
    run: docker run --rm --name app-nats -p 4222:4222 nats:2.10-alpine -js
    ready:
      tcp: localhost:4222
      timeout: 30s

  core:
    run: go run .
    workdir: apps/core
    depends_on:
      - postgres
      - nats
    ready:
      http: http://localhost:4100/health
      timeout: 90s

  web:
    run: pnpm --filter @app/web dev
    depends_on:
      - core
    ready:
      http: http://localhost:5273
      timeout: 60s
