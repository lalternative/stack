basePath: /api/v1
definitions:
  echo.HTTPError:
    properties:
      message: {}
    type: object
  example.CreateRequest:
    properties:
      name:
        type: string
    type: object
  example.ExampleDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  example.RenameRequest:
    properties:
      name:
        type: string
    type: object
info:
  contact: {}
  description: Stack application core REST API.
  title: Core API
  version: 0.1.0
paths:
  /examples:
    post:
      consumes:
      - application/json
      operationId: createExample
      parameters:
      - description: Example to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/example.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/example.ExampleDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Create an example
      tags:
      - examples
  /examples/{id}:
    get:
      operationId: getExample
      parameters:
      - description: Example id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.ExampleDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get an example by id
      tags:
      - examples
    patch:
      consumes:
      - application/json
      operationId: renameExample
      parameters:
      - description: Example id
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/example.RenameRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Rename an example
      tags:
      - examples
securityDefinitions:
  BearerAuth:
    description: Pass `Bearer <token>`. JWT is verified by the gateway; the user id
      arrives as the X-User-Id header.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
