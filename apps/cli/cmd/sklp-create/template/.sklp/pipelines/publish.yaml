version: 1
kind: pipeline
name: publish
description: |
  Build and push immutable Docker images for services impacted by the
  merged commit range on `main`.

  Image policy: rg.fr-par.scw.cloud/skaplai/<service>:<date>-<short-sha>
  Tags are immutable — no `latest`, no overwrites. Trivy blocks the push
  on any fixable HIGH/CRITICAL finding.

  Publishing the image is NOT deployment. ArgoCD Image Updater handles
  rollout once the new tag lands in the registry.

require:
  branches: [main]
  clean_tree: true

env_files:
  - .env
  - .env.local

tag:
  strategy: date-sha

registry:
  provider: scaleway

vulnerabilities:
  go:
    severity: [HIGH, CRITICAL]
  pnpm:
    severity: [high, critical]
    prod_only: true

tools:
  go: "1.25.0"
  node: "22.19.0"
  pnpm: "10.27.0"

scopes:
  core:
    - "apps/core/**"
    - "Dockerfile"
    - "go.work"
    - "go.work.sum"
  web:
    - "apps/web/**"
    - "package.json"
    - "pnpm-lock.yaml"
    - "Dockerfile.web"

steps:
  - name: core-image
    kind: docker-build
    scope: [core]
    context: .
    dockerfile: Dockerfile
    image: rg.fr-par.scw.cloud/skaplai/core
    tag: "{{ publish_tag }}"

  - name: web-image
    kind: docker-build
    scope: [web]
    context: .
    dockerfile: Dockerfile.web
    image: rg.fr-par.scw.cloud/skaplai/web
    tag: "{{ publish_tag }}"
